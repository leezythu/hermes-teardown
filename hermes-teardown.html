/* Lightweight Python syntax highlighter — no dependencies.
   Tokenizes a string and returns HTML with <span class="tok-*"> wrappers.
   Good enough for tutorial display of Python (and pseudo-Python) snippets. */

const PY_KEYWORDS = new Set([
  'def','class','return','if','elif','else','for','while','break','continue',
  'import','from','as','with','try','except','finally','raise','yield','lambda',
  'global','nonlocal','pass','del','assert','async','await','in','is','not','and',
  'or','from','match','case'
]);
const PY_BUILTIN_CONST = new Set(['True','False','None','self','cls']);

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightPython(src) {
  let out = '';
  let i = 0;
  const n = src.length;

  while (i < n) {
    const c = src[i];

    // Comments
    if (c === '#') {
      let j = i;
      while (j < n && src[j] !== '\n') j++;
      out += `<span class="tok-com">${escapeHtml(src.slice(i, j))}</span>`;
      i = j;
      continue;
    }

    // Triple-quoted strings
    if ((c === '"' || c === "'") && src.substr(i, 3) === c + c + c) {
      const q = c + c + c;
      let j = i + 3;
      while (j < n && src.substr(j, 3) !== q) j++;
      j = Math.min(j + 3, n);
      out += `<span class="tok-str">${escapeHtml(src.slice(i, j))}</span>`;
      i = j;
      continue;
    }

    // Single/double quoted strings (with escape handling)
    if (c === '"' || c === "'") {
      let j = i + 1;
      while (j < n && src[j] !== c) {
        if (src[j] === '\\') j++;
        j++;
      }
      j = Math.min(j + 1, n);
      out += `<span class="tok-str">${escapeHtml(src.slice(i, j))}</span>`;
      i = j;
      continue;
    }

    // Decorators
    if (c === '@' && (i === 0 || src[i-1] === '\n' || /\s/.test(src[i-1]))) {
      let j = i + 1;
      while (j < n && /[A-Za-z0-9_.]/.test(src[j])) j++;
      out += `<span class="tok-dec">${escapeHtml(src.slice(i, j))}</span>`;
      i = j;
      continue;
    }

    // Numbers
    if (/[0-9]/.test(c) && (i === 0 || !/[A-Za-z_]/.test(src[i-1]))) {
      let j = i;
      while (j < n && /[0-9._xXa-fA-F]/.test(src[j])) j++;
      out += `<span class="tok-num">${escapeHtml(src.slice(i, j))}</span>`;
      i = j;
      continue;
    }

    // Identifiers / keywords
    if (/[A-Za-z_]/.test(c)) {
      let j = i;
      while (j < n && /[A-Za-z0-9_]/.test(src[j])) j++;
      const word = src.slice(i, j);
      // function/class name following def/class
      const before = src.slice(Math.max(0, i - 7), i);
      let cls = '';
      if (PY_KEYWORDS.has(word)) cls = 'tok-kw';
      else if (PY_BUILTIN_CONST.has(word)) cls = (word === 'self' || word === 'cls') ? 'tok-self' : 'tok-bool';
      else if (/\bdef\s+$/.test(before)) cls = 'tok-fn';
      else if (/\bclass\s+$/.test(before)) cls = 'tok-cls';
      else if (src[j] === '(') cls = 'tok-fn';
      else if (/^[A-Z]/.test(word)) cls = 'tok-cls';
      if (cls) out += `<span class="${cls}">${escapeHtml(word)}</span>`;
      else out += escapeHtml(word);
      i = j;
      continue;
    }

    out += escapeHtml(c);
    i++;
  }
  return out;
}

window.highlightPython = highlightPython;
window.escapeHtml = escapeHtml;

  几乎每一个设计选择,都是从这两条推导出来的:
</p>

<div class="principles">
  <div class="principle">
    <div class="pn">原则 01</div>
    <h3>单会话的 prompt 缓存神圣不可侵犯</h3>
    <p>一段长对话每一轮都会复用缓存好的前缀。任何改动历史上下文、中途切换 toolset、
    或重建系统提示的行为,都会让缓存失效,把成本翻好几倍。所以 Hermes <em>从不</em>这么做 ——
    唯一的例外是上下文压缩。</p>
  </div>
  <div class="principle">
    <div class="pn">原则 02</div>
    <h3>核心是一根“窄腰”</h3>
    <p>每个工具都会被塞进每一次 API 调用,所以新增一个<em>核心</em>工具的门槛非常高。
    能力应该长在边缘 —— 作为 CLI 命令 + 技能、按需启用的工具、插件,或 MCP 服务器 ——
    而不是靠把核心做大。</p>
  </div>
</div>

<h2>窄腰阶梯</h2>
<p>
  每当有人提出一个新能力,Hermes 会把它推到能解决问题的<em>最高</em>(即占用最少)的那一级。
  正是这一条决策规则,让核心循环始终保持小巧,而整个系统却能做极多的事:
</p>

  <div class="ladder-rung"><div class="ladder-num">1</div><div class="ladder-body"><div class="lt">扩展已有代码</div><div class="ld">这个能力是已有东西的一个变体。零新增表面积。</div></div></div>
  <div class="ladder-rung"><div class="ladder-num">2</div><div class="ladder-body"><div class="lt">CLI 命令 + 技能</div><div class="ld">能用 shell 命令表达,由技能引导 Agent 去跑。零模型工具占用。</div></div></div>
  <div class="ladder-rung"><div class="ladder-num">3</div><div class="ladder-body"><div class="lt">按需启用的工具(服务门控)</div><div class="ld">需要结构化参数,且只有在某个前置条件配置好时才出现。否则零占用。</div></div></div>
  <div class="ladder-rung"><div class="ladder-num">4</div><div class="ladder-body"><div class="lt">插件</div><div class="ld">第三方或小众能力,运行时从 <code>~/.hermes/plugins/</code> 发现。</div></div></div>

  <div class="ladder-rung"><div class="ladder-num">6</div><div class="ladder-body"><div class="lt">新的核心工具</div><div class="ld">只有当它足够基础、几乎对每个用户都有用时才考虑。比如 terminal、read_file、web_search。</div></div></div>
</div>

<div class="callout">

  <p>一个优秀的 harness 不是一个聪明的循环。它是一个小而稳定的循环,外面包了几十层 ——
  每一层都处理“现实入侵”的一种方式:上下文超限、提供方抽风、忘掉的事实、停不下来的迭代、
  以及那些活得比一轮对话更久的任务。我们会一层一层地把它们加上去。</p>

      "Plugin 钩子——pre_llm_call 在序章中触发（注入到用户消息里，而非 system prompt），transform_llm_output / post_llm_call / on_session_end 在尾声中触发",
      "轨迹保存——finalize_turn 每轮调用一次 _save_trajectory 并附上完成状态",
      "prompt 缓存不变量（AGENTS.md 原则 1）——整章都是捍卫被缓存前缀的一个实例；关联到只精确到日期的时间戳，以及不在 session 进行中重建的规则"
    ],
    "sections": [
      {
        "h": "一段话回顾整段旅程",
        "body": "我们从十几行代码起步:调用模型、执行它请求的工具、把结果追加回去、循环。然后每一章都加上一层,各自应对“现实入侵”的一种方式。**一个注册表**,让工具即插即用、不必撑大循环。**Toolset 与窄腰**,让每次调用发送的 schema 始终小巧。**预算与中断**,让循环总能终止、用户能随时改变方向。**prompt 缓存** —— 这个不变量随后约束了下游的一切。**压缩**,是唯一被许可的缓存破坏操作。**记忆、技能与会话存储**,让 Agent 能跨时间学习。**委派**把任务扇出,**错误分类与提供方故障转移**让它在 API 抽风时存活,**cron + kanban** 处理那些活得比一轮对话更久的任务。这最后一章,正是它们交汇之处:把这一切围绕同一个微小循环串起来的、每一轮对话的开场与收尾。"
      }
    ],
    "outro": "要带走的模式是:**一个优秀的 harness 不是一个聪明的循环 —— 而是一个小而稳定的循环,外面包了一层层、每层吸收现实的一种失败模式。** 第一章那个循环至今还在里面,原封未动。其余的一切,都是边缘。"
  }
];

  </script>
  <script>
/* ============================================================
   Hermes Teardown — SPA renderer
   Reads window.CHAPTERS (array) + window.INTRO.
   Hash routing: #/  (landing), #/ch/<id>
   ============================================================ */

const app = {
  el: {},
  init() {
    this.el.sidebar = document.getElementById('sidebar');
    this.el.content = document.getElementById('content-inner');
    this.el.progress = document.getElementById('progress-fill');
    this.el.scrim = document.getElementById('scrim');
    this.buildNav();
    window.addEventListener('hashchange', () => this.route());
    window.addEventListener('scroll', () => this.updateProgress());
    document.getElementById('menu-toggle').addEventListener('click', () => this.toggleMenu());
    this.el.scrim.addEventListener('click', () => this.toggleMenu(false));
    this.route();
  },

  toggleMenu(force) {
    const open = force === undefined ? !this.el.sidebar.classList.contains('open') : force;
    this.el.sidebar.classList.toggle('open', open);
    this.el.scrim.classList.toggle('open', open);
  },

  buildNav() {
    const nav = document.getElementById('nav');
    let html = `<div class="nav-section-label">从这里开始</div>
      <ul class="nav-list">
        <li class="nav-item" data-route="#/"><span class="nav-num">○</span><span class="nav-title">总览与核心思想</span></li>
      </ul>`;
    // group chapters by phase, preserving order
    let lastPhase = null;
    CHAPTERS.forEach((ch, i) => {
      if (ch.phase !== lastPhase) {
        if (lastPhase !== null) html += `</ul>`;
        html += `<div class="nav-section-label">${escapeHtml(ch.phase || 'Chapters')}</div><ul class="nav-list">`;
        lastPhase = ch.phase;
      }
      html += `<li class="nav-item" data-route="#/ch/${ch.id}">
        <span class="nav-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="nav-title">${escapeHtml(ch.title)}</span>
      </li>`;
    });
    html += `</ul>`;
    nav.innerHTML = html;
    nav.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        location.hash = item.dataset.route;
        this.toggleMenu(false);
      });
    });
  },

  setActiveNav(route) {
    this.el.sidebar.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.route === route);
    });
  },

  route() {
    const hash = location.hash || '#/';
    window.scrollTo(0, 0);
    if (hash.startsWith('#/ch/')) {
      const id = hash.slice(5);
      const idx = CHAPTERS.findIndex(c => c.id === id);
      if (idx >= 0) { this.renderChapter(idx); this.setActiveNav(hash); return; }
    }
    this.renderLanding();
    this.setActiveNav('#/');
  },

  updateProgress() {
    const h = document.documentElement;
    const scrolled = h.scrollTop;
    const total = h.scrollHeight - h.clientHeight;
    const pct = total > 0 ? (scrolled / total) * 100 : 0;
    this.el.progress.style.width = pct + '%';
  },

  // ---------- Renderers ----------
  renderLanding() {
    this.el.content.innerHTML = INTRO;
    this.el.content.classList.remove('fade-in'); void this.el.content.offsetWidth;
    this.el.content.classList.add('fade-in');
    // wire ladder rungs + CTA that link to chapters
    this.el.content.querySelectorAll('[data-goto]').forEach(elm => {
      elm.addEventListener('click', () => { location.hash = elm.dataset.goto; });
    });
    this.updateProgress();
  },

  renderChapter(idx) {
    const ch = CHAPTERS[idx];
    let h = '';

    h += `<div class="chapter-eyebrow">
      <span class="step-badge">第 ${String(idx + 1).padStart(2, '0')} 步 / 共 ${CHAPTERS.length} 步</span>
      <span>${escapeHtml(ch.phase || '搭建这个 harness')}</span>
    </div>`;
    h += `<h1>${escapeHtml(ch.title)}</h1>`;
    if (ch.one_line) h += `<div class="chapter-oneline">${escapeHtml(ch.one_line)}</div>`;

    if (ch.problem) {
      h += `<div class="block problem">
        <div class="block-head"><span class="block-icon">✕</span> 问题所在 —— 没有它会坏在哪</div>
        <div class="block-body">${this.mdToP(ch.problem)}</div>
      </div>`;
    }

    if (ch.design_decision) {
      h += `<div class="block design">
        <div class="block-head"><span class="block-icon">✓</span> Hermes 的设计决策</div>
        <div class="block-body">${this.mdToP(ch.design_decision)}</div>
      </div>`;
    }

    // extra prose sections (optional, for hand-authored richness)
    if (ch.sections) {
      ch.sections.forEach(s => {
        h += `<h2>${escapeHtml(s.h)}</h2>`;
        h += this.mdToP(s.body);
      });
    }

    if (ch.code_snippets && ch.code_snippets.length) {
      h += `<h2>代码里是怎么做的</h2>`;
      ch.code_snippets.forEach((cs, ci) => { h += this.renderCode(cs, idx, ci); });
    }

    if (ch.gotchas && ch.gotchas.length) {
      h += `<h2>注意事项与不变量</h2><ul class="gotcha-list">`;
      ch.gotchas.forEach(g => { h += `<li>${this.inlineMd(g)}</li>`; });
      h += `</ul>`;
    }

    if (ch.connects_to && ch.connects_to.length) {
      h += `<h2>关联到</h2><div class="pill-list">`;
      ch.connects_to.forEach(c => { h += `<span class="pill">${escapeHtml(c)}</span>`; });
      h += `</div>`;
    }

    if (ch.outro) {
      h += `<div class="callout"><div class="callout-title">☤ 要点带走</div>${this.mdToP(ch.outro)}</div>`;
    }

    // prev / next
    const prev = CHAPTERS[idx - 1];
    const next = CHAPTERS[idx + 1];
    h += `<div class="chapter-nav">
      ${prev
        ? `<a href="#/ch/${prev.id}"><div class="cn-label">← 上一章</div><div class="cn-title">${escapeHtml(prev.title)}</div></a>`
        : `<a href="#/" ><div class="cn-label">← 返回</div><div class="cn-title">总览</div></a>`}
      ${next
        ? `<a class="next" href="#/ch/${next.id}"><div class="cn-label">下一章 →</div><div class="cn-title">${escapeHtml(next.title)}</div></a>`
        : `<a class="next" href="#/"><div class="cn-label">读完了 →</div><div class="cn-title">回到总览</div></a>`}
    </div>`;

    this.el.content.innerHTML = h;
    this.el.content.classList.remove('fade-in'); void this.el.content.offsetWidth;
    this.el.content.classList.add('fade-in');
    this.wireCopyButtons();
    this.updateProgress();
  },

  renderCode(cs, chIdx, ci) {
    const id = `code-${chIdx}-${ci}`;
    const hl = highlightPython(cs.code.replace(/\s+$/, ''));
    return `<div class="code-card">
      ${cs.caption ? `<div class="code-caption">${escapeHtml(cs.caption)}</div>` : ''}
      <div class="code-filebar">
        <span class="file-path">${escapeHtml(cs.file)}${cs.lines ? ':' + escapeHtml(cs.lines) : ''}</span>
        <button class="copy-btn" data-copy="${id}">copy</button>
      </div>
      <pre><code id="${id}">${hl}</code></pre>
      ${cs.explanation ? `<div class="code-explain">${this.inlineMd(cs.explanation)}</div>` : ''}
    </div>`;
  },

  wireCopyButtons() {
    this.el.content.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const code = document.getElementById(btn.dataset.copy);
        navigator.clipboard.writeText(code.innerText).then(() => {
          const t = btn.textContent; btn.textContent = 'copied ✓';
          setTimeout(() => btn.textContent = t, 1200);
        });
      });
    });
  },

  // ---------- tiny markdown ----------
  inlineMd(s) {
    return escapeHtml(s)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  },
  mdToP(s) {
    return s.split(/\n\n+/).map(para => `<p>${this.inlineMd(para.trim()).replace(/\n/g, '<br>')}</p>`).join('');
  },
};

document.addEventListener('DOMContentLoaded', () => app.init());

  </script>
</body>
